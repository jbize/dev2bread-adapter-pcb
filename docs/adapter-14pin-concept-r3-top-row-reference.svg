<?xml version="1.0" encoding="UTF-8"?>
<!--
  FROZEN REFERENCE - do not edit. Snapshot of R3 strap routing (same as adapter-14pin-concept-r3-top-row.svg at branch point).
  Ongoing work: adapter-14pin-concept-r4.svg
  Step 3: Strap pads (above J1-J7) to STEM right column J23-J29, same index per net.
  Strap centers offset +22px right from column grid (k*48+22, 168) so r=7 straps clear r=14 J1-J7 holes. Routing mirrors red J(7-k) to (216, 316+k*48).
