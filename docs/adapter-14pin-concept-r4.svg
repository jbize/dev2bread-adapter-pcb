<?xml version="1.0" encoding="UTF-8"?>
<!--
  R4 — outline, HEAD (J23-J29 / J1-J7), strap pads (J29..J23), bus reversal (same geometry as docs/reverse-traces.svg), strap-to-stem (nets-top).
  Strap centers at 22+k*48 (y=168 abs) so down traces fall between J1–J7 holes; nets-reversal strap-side coords offset +22 from docs/reverse-traces.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 780" font-family="system-ui, Segoe UI, sans-serif" font-size="11">
  <title>14-pin concept - R4 (strap pads to stem J23-J29)</title>
  <defs>
    <style type="text/css"><![CDATA[
      .outline { fill: none; stroke: #c0c; stroke-width: 3; stroke-linejoin: round; }
      .pad { fill: #444; stroke: #888; stroke-width: 1; }
      .pad-small { fill: #383838; stroke: #777; stroke-width: 1; }
      .label { fill: #ddd; font-size: 10px; }
      .label-small { fill: #9cf; font-size: 8px; }
      .title { fill: #eee; font-size: 14px; font-weight: 600; }
      .note { fill: #aaa; font-size: 9px; }
      .net-top { fill: none; stroke: #6cf; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-opacity: 0.95; }
      .trace-cyan { fill: none; stroke: #6cf; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-opacity: 0.95; }
      .trace-red-inner { fill: none; stroke: #e33; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-opacity: 0.95; }
      .via { fill: #284; stroke: #8f8; stroke-width: 1; }
      .via-x { stroke: #efe; stroke-width: 0.9; }
      .ref-line-h { fill: none; stroke: #666; stroke-width: 0.9; stroke-dasharray: 5 5; stroke-opacity: 0.65; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="560" height="780" fill="#1a1a1a"/>

  <text x="280" y="28" text-anchor="middle" class="title">14-pin concept - R4 adapter (reversal + strap to stem)</text>
  <text x="280" y="46" text-anchor="middle" class="note">Bus reversal from docs/reverse-traces.svg; strap row +22 vs pin grid so drops sit between J1–J7 (y=168).</text>
  <text x="280" y="62" text-anchor="middle" class="note">J1–J7 neck: adapter-14pin-concept.svg. Strap to stem: frozen R3 reference.</text>

  <g transform="translate(88, 80)">
    <path class="outline" d="M -24,0 L 336,0 L 336,300 L 216,300 L 216,636 L 104,636 L 104,300 L -24,300 Z"/>

    <!-- Embedded from docs/reverse-traces.svg: traces + vias only (pads = head-top / head-bottom-strap) -->
    <g id="nets-reversal" aria-label="bus reversal (docs/reverse-traces.svg)">
      <g class="trace-red-inner" aria-label="inner layer horizontals">
        <polyline points="316,149.333 310,149.333"/>
        <polyline points="316,130.667 262,130.667"/>
        <polyline points="316,112 214,112"/>
        <polyline points="316,93.333 166,93.333"/>
        <polyline points="316,74.667 118,74.667"/>
        <polyline points="316,56 70,56"/>
        <polyline points="316,37.333 22,37.333"/>
      </g>
      <g class="trace-cyan" aria-label="reversal outer copper">
        <polyline points="0,0 316,149.333"/>
        <polyline points="310,149.333 310,168"/>
        <polyline points="48,0 316,130.667"/>
        <polyline points="262,130.667 262,168"/>
        <polyline points="96,0 316,112"/>
        <polyline points="214,112 214,168"/>
        <polyline points="144,0 316,93.333"/>
        <polyline points="166,93.333 166,168"/>
        <polyline points="192,0 316,74.667"/>
        <polyline points="118,74.667 118,168"/>
        <polyline points="240,0 316,56"/>
        <polyline points="70,56 70,168"/>
        <polyline points="288,0 316,37.333"/>
        <polyline points="22,37.333 22,168"/>
      </g>
      <g aria-label="vias" stroke-linecap="round">
        <g transform="translate(316,149.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,130.667)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,112)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,93.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,74.667)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,56)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(316,37.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(310,149.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(262,130.667)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(214,112)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(166,93.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(118,74.667)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(70,56)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
        <g transform="translate(22,37.333)"><circle r="3.5" class="via"/><line x1="-4" y1="0" x2="4" y2="0" class="via-x"/><line x1="0" y1="-4" x2="0" y2="4" class="via-x"/></g>
      </g>
    </g>

    <!-- Strap y=168; vertical to y=210 (J1–J7 hole-bottom ref); diagonal to (x,284); vertical to neck; horizontal to stem. -->
    <g id="nets-top" class="net-top">
      <polyline points="310,168 310,210 186,284 186,316 216,316"/>
      <polyline points="262,168 262,210 175,284 175,364 216,364"/>
      <polyline points="214,168 214,210 164,284 164,412 216,412"/>
      <polyline points="166,168 166,210 153,284 153,460 216,460"/>
      <polyline points="118,168 118,210 142,284 142,508 216,508"/>
      <polyline points="70,168 70,210 131,284 131,556 216,556"/>
      <polyline points="22,168 22,210 120,284 120,604 216,604"/>
    </g>

    <g id="head-top">
      <text x="156" y="-12" text-anchor="middle" class="label" fill="#9cf">HEAD - top row (J23-J29)</text>
      <circle cx="0" cy="0" r="14" class="pad"/>
      <circle cx="48" cy="0" r="14" class="pad"/>
      <circle cx="96" cy="0" r="14" class="pad"/>
      <circle cx="144" cy="0" r="14" class="pad"/>
      <circle cx="192" cy="0" r="14" class="pad"/>
      <circle cx="240" cy="0" r="14" class="pad"/>
      <circle cx="288" cy="0" r="14" class="pad"/>
      <text x="0" y="4" text-anchor="middle" class="label" fill="#9cf">J23</text>
      <text x="48" y="4" text-anchor="middle" class="label" fill="#9cf">J24</text>
      <text x="96" y="4" text-anchor="middle" class="label" fill="#9cf">J25</text>
      <text x="144" y="4" text-anchor="middle" class="label" fill="#9cf">J26</text>
      <text x="192" y="4" text-anchor="middle" class="label" fill="#9cf">J27</text>
      <text x="240" y="4" text-anchor="middle" class="label" fill="#9cf">J28</text>
      <text x="288" y="4" text-anchor="middle" class="label" fill="#9cf">J29</text>
    </g>

    <g id="head-bottom" transform="translate(0,196)">
      <text x="156" y="-8" text-anchor="middle" class="label" fill="#f88">HEAD - bottom row (J1-J7)</text>
      <!-- Small pads between J1–J7 holes (+22 vs pin centers); J29..J23 left to right -->
      <g id="head-bottom-strap">
        <circle cx="22" cy="-28" r="7" class="pad-small"/>
        <circle cx="70" cy="-28" r="7" class="pad-small"/>
        <circle cx="118" cy="-28" r="7" class="pad-small"/>
        <circle cx="166" cy="-28" r="7" class="pad-small"/>
        <circle cx="214" cy="-28" r="7" class="pad-small"/>
        <circle cx="262" cy="-28" r="7" class="pad-small"/>
        <circle cx="310" cy="-28" r="7" class="pad-small"/>
        <text x="22" y="-24" text-anchor="middle" class="label-small">J29</text>
        <text x="70" y="-24" text-anchor="middle" class="label-small">J28</text>
        <text x="118" y="-24" text-anchor="middle" class="label-small">J27</text>
        <text x="166" y="-24" text-anchor="middle" class="label-small">J26</text>
        <text x="214" y="-24" text-anchor="middle" class="label-small">J25</text>
        <text x="262" y="-24" text-anchor="middle" class="label-small">J24</text>
        <text x="310" y="-24" text-anchor="middle" class="label-small">J23</text>
      </g>
      <circle cx="0" cy="0" r="14" class="pad"/>
      <circle cx="48" cy="0" r="14" class="pad"/>
      <circle cx="96" cy="0" r="14" class="pad"/>
      <circle cx="144" cy="0" r="14" class="pad"/>
      <circle cx="192" cy="0" r="14" class="pad"/>
      <circle cx="240" cy="0" r="14" class="pad"/>
      <circle cx="288" cy="0" r="14" class="pad"/>
      <text x="0" y="4" text-anchor="middle" class="label" fill="#f88">J1</text>
      <text x="48" y="4" text-anchor="middle" class="label" fill="#f88">J2</text>
      <text x="96" y="4" text-anchor="middle" class="label" fill="#f88">J3</text>
      <text x="144" y="4" text-anchor="middle" class="label" fill="#f88">J4</text>
      <text x="192" y="4" text-anchor="middle" class="label" fill="#f88">J5</text>
      <text x="240" y="4" text-anchor="middle" class="label" fill="#f88">J6</text>
      <text x="288" y="4" text-anchor="middle" class="label" fill="#f88">J7</text>
    </g>

    <!-- J1–J7 pin centers y=196, r=14 → hole bottom edge y=210 -->
    <line x1="-24" y1="210" x2="336" y2="210" class="ref-line-h" aria-label="reference at bottom edge of J1–J7 holes"/>

    <text x="156" y="308" text-anchor="middle" class="note">neck</text>

    <g id="stem" transform="translate(104, 316)">
      <text x="56" y="-14" text-anchor="middle" class="label" fill="#8f8">STEM - mate to breadboard (J1-J7 / J23-J29)</text>
      <circle cx="0" cy="0" r="14" class="pad"/>
      <circle cx="0" cy="48" r="14" class="pad"/>
      <circle cx="0" cy="96" r="14" class="pad"/>
      <circle cx="0" cy="144" r="14" class="pad"/>
      <circle cx="0" cy="192" r="14" class="pad"/>
      <circle cx="0" cy="240" r="14" class="pad"/>
      <circle cx="0" cy="288" r="14" class="pad"/>
      <circle cx="112" cy="0" r="14" class="pad"/>
      <circle cx="112" cy="48" r="14" class="pad"/>
      <circle cx="112" cy="96" r="14" class="pad"/>
      <circle cx="112" cy="144" r="14" class="pad"/>
      <circle cx="112" cy="192" r="14" class="pad"/>
      <circle cx="112" cy="240" r="14" class="pad"/>
      <circle cx="112" cy="288" r="14" class="pad"/>

      <text x="-28" y="8" class="label" fill="#f88">J1</text>
      <text x="-28" y="56" class="label" fill="#f88">J2</text>
      <text x="-28" y="104" class="label" fill="#f88">J3</text>
      <text x="-28" y="152" class="label" fill="#f88">J4</text>
      <text x="-28" y="200" class="label" fill="#f88">J5</text>
      <text x="-28" y="248" class="label" fill="#f88">J6</text>
      <text x="-28" y="296" class="label" fill="#f88">J7</text>

      <text x="140" y="8" class="label" fill="#9cf">J23</text>
      <text x="140" y="56" class="label" fill="#9cf">J24</text>
      <text x="140" y="104" class="label" fill="#9cf">J25</text>
      <text x="140" y="152" class="label" fill="#9cf">J26</text>
      <text x="140" y="200" class="label" fill="#9cf">J27</text>
      <text x="140" y="248" class="label" fill="#9cf">J28</text>
      <text x="140" y="296" class="label" fill="#9cf">J29</text>
    </g>

  </g>

  <text x="280" y="718" text-anchor="middle" class="note">Reversal geometry: docs/reverse-traces.svg (embedded as nets-reversal). Strap to stem: frozen adapter-14pin-concept-r3-top-row-reference.svg.</text>
  <text x="280" y="736" text-anchor="middle" class="note">Thin cyan/red = reversal layers; thick cyan = strap to stem. J1–J7 neck: adapter-14pin-concept.svg.</text>
  <text x="280" y="756" text-anchor="middle" class="note">Strap pads at 22+k·48 (y=168) between J1–J7; nets-reversal strap-side coords +22 vs docs/reverse-traces.svg.</text>
</svg>
