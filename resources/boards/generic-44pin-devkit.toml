# Generic 44-pin T-adapter profile: full stem, numeric per-pin silk (1..N / 1..N), Godswind branding.
# Preview: ./scripts/preview_adapter_board.py --profile resources/boards/generic-44pin-devkit.toml --silk numeric
# EasyEDA: ./scripts/generate_easyeda_adapter_pcb.py --profile resources/boards/generic-44pin-devkit.toml --silk-labels numeric

schema = 1

id = "generic-44pin-devkit"
title = "Generic 44-pin dev kit adapter"
description = "Full T-adapter for a dual-row dev module; numeric silk and optional kit branding."

device_min_pins = 44
adapter_pins = 44

# Per-pin silk: logical 1..22 on each row + four J1/J3 connector refs (see numeric_silk_paths.json).
silk_profile = "numeric"

[branding]
text = "Godswind Consulting"
image = "resources/images/godswind-east.png"
preview_silk_color = "#E6B800"
font_family = "DejaVu Serif"
font_size = 96
font_weight = "normal"
font_style = "normal"

[geometry]
n_rows_top = 4
n_rows_bottom = 4
omit_row_b_gap_adjacent = true
