name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff + mypy
        run: pip install "ruff>=0.8" "mypy>=1.8"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy (scoped; see pyproject.toml [tool.mypy] files=)
        run: mypy
      - name: Pytest
        run: pip install "pytest>=8.0" && pytest -q

  verify-outputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install matplotlib
      - name: Verify preview + EasyEDA outputs vs baseline
        run: python scripts/verify_board_outputs.py --no-branding
